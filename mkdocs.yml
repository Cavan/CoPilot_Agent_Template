site_name: Copilot Custom Agents Guide
site_description: Build, compose, and deploy custom agents for GitHub Copilot Chat
site_url: http://localhost:8000

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Docs:
      - Composing Agents: composing-agents.md
      - Glossary: glossary.md
      - Resources: resources.md
  - Example Agents:
      - Code Reviewer: agents/code-reviewer.md
      - Planner: agents/planner.md
      - Implementer: agents/implementer.md
      - Test Writer: agents/test-writer.md
      - Doc Writer: agents/doc-writer.md
      - Orchestrator: agents/orchestrator.md
